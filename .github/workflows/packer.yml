name: Packer
on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
    secrets:
      netbird_setup_key:
        required: true
      netbird_management_url:
        required: true
      proxmox_host:
        required: true
      proxmox_user:
        required: true
      proxmox_password:
        required: false
      proxmox_token:
        required: false
concurrency:
  group: packer-${{ inputs.name }}
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        timeout-minutes: 5
        uses: actions/checkout@v6
      - name: Netbird Connect
        timeout-minutes: 5
        uses: gene1wood/netbird-connect@b8c6916d108aee5e327546e49efcd29bbd41b69f #v1.1.0
        with:
          setup-key: ${{ secrets.netbird_setup_key }}
          management-url: ${{ secrets.netbird_management_url }}
      - name: Use Packer
        timeout-minutes: 5
        uses: hashicorp-contrib/setup-packer@v3
        with:
          # renovate: githubReleaseVar repo=hashicorp/packer
          packer-version: 1.15.3
      - name: Install mkisofs
        timeout-minutes: 5
        run: sudo apt update && sudo apt install -y mkisofs jq curl
      - name: Get Proxmox Node
        id: proxmox
        timeout-minutes: 5
        env:
          PROXMOX_HOST: ${{ secrets.proxmox_host }}
          PROXMOX_USER: ${{ secrets.proxmox_user }}
          PROXMOX_TOKEN: ${{ secrets.proxmox_token }}
        run: |
          set -euo pipefail
          TOKEN_ID="${PROXMOX_TOKEN%%=*}"
          TOKEN_SECRET="${PROXMOX_TOKEN#*=}"
          AUTH_HEADER="PVEAPIToken=${PROXMOX_USER}!${TOKEN_ID}=${TOKEN_SECRET}"

          NODE=$(curl -sk -m 30 \
            -H "Authorization: ${AUTH_HEADER}" \
            "https://${PROXMOX_HOST}/api2/json/cluster/resources?type=node" | \
            jq -r '[.data[] | select(.status=="online")] | sort_by(.vmid // 0) | .[0].node')

          if [ -z "$NODE" ] || [ "$NODE" = "null" ]; then
            echo "ERROR: No online node found in cluster"
            exit 1
          fi

          # Get node IP (interface with gateway)
          NODE_IP=$(curl -sk -m 30 \
            -H "Authorization: ${AUTH_HEADER}" \
            "https://${PROXMOX_HOST}/api2/json/nodes/${NODE}/network" | \
            jq -r '[.data[] | select(.gateway != null and .address != null and .active == 1)] | .[0].address | split("/")[0]')

          if [ -z "$NODE_IP" ] || [ "$NODE_IP" = "null" ]; then
            echo "ERROR: No network interface with gateway found on node ${NODE}"
            exit 1
          fi

          NODE_URL="https://${NODE_IP}:8006"
          echo "Selected node: ${NODE} (${NODE_IP})"

          # Verify connectivity to node IP
          echo "Testing connectivity to ${NODE_URL}..."
          if ! curl -sk -m 10 -o /dev/null -w "%{http_code}" \
            -H "Authorization: ${AUTH_HEADER}" \
            "${NODE_URL}/api2/json/version" 2>/dev/null | grep -q "200"; then
            echo "WARNING: Cannot reach ${NODE_URL}, falling back to PROXMOX_HOST"
            NODE_URL="https://${PROXMOX_HOST}"
          else
            echo "Connectivity OK"
          fi

          echo "node=${NODE}" >> "$GITHUB_OUTPUT"
          echo "node_url=${NODE_URL}" >> "$GITHUB_OUTPUT"
          echo "auth_header=${AUTH_HEADER}" >> "$GITHUB_OUTPUT"

      - name: Upload ISO to Proxmox
        id: iso
        timeout-minutes: 15
        env:
          AUTH_HEADER: ${{ steps.proxmox.outputs.auth_header }}
          NODE: ${{ steps.proxmox.outputs.node }}
          NODE_URL: ${{ steps.proxmox.outputs.node_url }}
        run: |
          set -euo pipefail

          ISO_URL=$(awk -F'"' '/^iso_url/ {print $2}' "${{ inputs.name }}.pkrvars.hcl")
          ISO_FILE=$(awk -F'"' '/^iso_file/ {print $2}' "${{ inputs.name }}.pkrvars.hcl")

          if [ -z "$ISO_URL" ]; then
            echo "No iso_url found, skipping ISO upload"
            exit 0
          fi

          echo "ISO: ${ISO_FILE}"
          echo "URL: ${ISO_URL}"

          # Check if ISO already exists in storage
          STORAGE_RESP=$(curl -sk -m 30 \
            -H "Authorization: ${AUTH_HEADER}" \
            "${NODE_URL}/api2/json/nodes/${NODE}/storage/local/content")
          echo "Storage response: $(echo "$STORAGE_RESP" | head -c 200)"
          EXISTS=$(echo "$STORAGE_RESP" | jq -r '(.data // [])[] | select(.volid=="iso/'"${ISO_FILE}"'") | .volid' | head -1)

          if [ -n "$EXISTS" ]; then
            echo "ISO already exists: ${EXISTS}"
            exit 0
          fi

          # Download ISO to runner
          echo "Downloading ISO from source..."
          curl -fL --progress-bar -o "/tmp/${ISO_FILE}" "${ISO_URL}"
          echo "Download complete: $(du -h /tmp/${ISO_FILE} | cut -f1)"

          # Upload to Proxmox node directly
          echo "Uploading to node ${NODE} via ${NODE_URL}..."
          RESPONSE=$(curl -sk -w "\n%{http_code}" -X POST \
            -H "Authorization: ${AUTH_HEADER}" \
            -F "content=iso" \
            -F "filename=@/tmp/${ISO_FILE}" \
            "${NODE_URL}/api2/json/nodes/${NODE}/storage/local/upload")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP ${HTTP_CODE}: ${BODY}"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: ISO upload failed (HTTP ${HTTP_CODE})"
            exit 1
          fi

          # Cleanup
          rm -f "/tmp/${ISO_FILE}"
          echo "ISO uploaded successfully"

      - name: Build image from template
        timeout-minutes: 10
        env:
          PKR_VAR_proxmox_host: ${{ secrets.proxmox_host }}
          PKR_VAR_proxmox_user: ${{ secrets.proxmox_user }}
          PKR_VAR_proxmox_password: ${{ secrets.proxmox_password }}
          PKR_VAR_proxmox_token: ${{ secrets.proxmox_token }}
          PKR_VAR_node: ${{ steps.proxmox.outputs.node }}
          PKR_VAR_pool: templates
          PKR_VAR_iso_storage_pool: local
          PKR_VAR_disk_storage_pool: local-lvm
          PKR_VAR_cloud_init_storage_pool: local-lvm
          PKR_VAR_disk_format: raw
          PKR_VAR_iso_download: "false"
          PKR_VAR_packer_http_interface: "wt0"
          PACKER_KEY_INTERVAL: 100ms
        run: |
          packer init config.pkr.hcl
          packer build -var-file="${{ inputs.name }}.pkrvars.hcl" -force .

      - name: Netbird Disconnect
        if: always()
        timeout-minutes: 3
        shell: bash
        run: sudo netbird down
